services:
  backend:
    container_name: book-exchange-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=
      - MAIL_PASSWORD=
      - MAIL_SMTP_AUTH=false
      - MAIL_SMTP_STARTTLS_ENABLE=false
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - APP_BASE_URL=http://localhost:${BACKEND_PORT:-8080}
      - APP_FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:${FRONTEND_PORT:-5173}
      - APP_SHOWCASE_SWAGGER_URL=http://localhost:${BACKEND_PORT:-8080}/api/v1/swagger-ui/index.html
      - MANAGEMENT_PORT=${BACKEND_MANAGEMENT_PORT:-8081}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${BACKEND_MANAGEMENT_PORT:-8081}:${BACKEND_MANAGEMENT_PORT:-8081}"
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
      elasticsearch:
        condition: service_healthy

  frontend:
    container_name: book-exchange-frontend
    build:
      context: ${FRONTEND_CONTEXT:-../book-exchange-frontend}
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}/api/v1}
      dockerfile_inline: |
        FROM node:22-alpine AS build
        WORKDIR /app
        ARG VITE_API_BASE_URL
        ENV VITE_API_BASE_URL=$$VITE_API_BASE_URL
        COPY package*.json ./
        RUN npm ci
        COPY . .
        RUN npm run build

        FROM nginx:1.27-alpine
        COPY --from=build /app/dist /usr/share/nginx/html
        RUN printf '%s\n' \
          'server {' \
          '  listen 80;' \
          '  server_name _;' \
          '  root /usr/share/nginx/html;' \
          '  index index.html;' \
          '  location / {' \
          '    try_files $$uri $$uri/ /index.html;' \
          '  }' \
          '}' > /etc/nginx/conf.d/default.conf
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_started

  mysql:
    container_name: book_exchange_mysql
    image: 'mysql:latest'
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_USER=${DB_USERNAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: book-exchange-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_WEB_PORT}:8025"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.5
    container_name: book-exchange-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
        - elasticsearch_data_v9:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mysql_data:
  elasticsearch_data_v9:
