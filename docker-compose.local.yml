# Local full-stack compose: backend, frontend, MySQL, Mailpit, Elasticsearch.
# Elastic Beanstalk demo deployment uses docker-compose.eb.template.yml.
services:
  backend:
    container_name: book-exchange-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://mysql:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=
      - MAIL_PASSWORD=
      - MAIL_SMTP_AUTH=false
      - MAIL_SMTP_STARTTLS_ENABLE=false
      - APP_DEMO_EMAIL_SANDBOX_MAILPIT_API_BASE_URL=http://mailpit:8025
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - APP_BASE_URL=http://localhost:${BACKEND_PORT:-8080}
      - APP_FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:${FRONTEND_PORT:-5173}
      - APP_SHOWCASE_SWAGGER_URL=http://localhost:${BACKEND_PORT:-8080}/api/v1/swagger-ui/index.html
      - MANAGEMENT_PORT=${BACKEND_MANAGEMENT_PORT:-8081}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${BACKEND_MANAGEMENT_PORT:-8081}:${BACKEND_MANAGEMENT_PORT:-8081}"
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./pom.xml
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./.env
        - action: rebuild
          path: ./mvnw
        - action: rebuild
          path: ./.mvn

  frontend:
    container_name: book-exchange-frontend
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
      - VITE_API_CREDENTIALS=${VITE_API_CREDENTIALS:-same-origin}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://backend:8080}
      - VITE_DEMO_CONTACT_EMAIL=${VITE_DEMO_CONTACT_EMAIL:-demo-contact@example.com}
      - VITE_DEV_HOST=0.0.0.0
      - VITE_DEV_PORT=5173
      - VITE_USE_POLLING=true
    volumes:
      - "${FRONTEND_CONTEXT:-../book-exchange-frontend}:/app"
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started

  mysql:
    container_name: book_exchange_mysql
    image: 'mysql:latest'
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_USER=${DB_USERNAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: book-exchange-mailpit
    environment:
      - MP_MAX_MESSAGES=${MAILPIT_MAX_MESSAGES:-500}
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_WEB_PORT}:8025"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.5
    container_name: book-exchange-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
        - elasticsearch_data_v9:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mysql_data:
  elasticsearch_data_v9:
  frontend_node_modules:
