spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/${DB_NAME:book_exchange_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=${DB_POOL_NAME:BookExchangeDB-Pool}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:600000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME:300000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.docker.compose.enabled=false

spring.mail.host=${MAIL_HOST:mailpit}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}

spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}

app.storage.s3.use-test-bucket=${APP_STORAGE_S3_USE_TEST_BUCKET:true}
app.storage.s3.key-prefix=${APP_STORAGE_S3_KEY_PREFIX:}
