spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=${DB_POOL_NAME:BookExchangeDB-Pool}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:600000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME:300000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.docker.compose.enabled=false
spring.h2.console.enabled=false

logging.level.com.example=${APP_LOG_LEVEL:info}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS}

app.storage.s3.use-test-bucket=${APP_STORAGE_S3_USE_TEST_BUCKET:false}
app.demo-email-sandbox.enabled=${APP_DEMO_EMAIL_SANDBOX_ENABLED:true}
app.demo-email-sandbox.mailpit-api-base-url=${APP_DEMO_EMAIL_SANDBOX_MAILPIT_API_BASE_URL:http://mailpit:8025}

springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_ENABLED:false}
