validation.password.strong= должен содержать от 8 до 64 символов, заглавные и строчные буквы, цифру и специальный символ
validation.image.base64=должно представлять собой допустимую строку Base64 и не превышать {maxLength} символов
validation.publicationYear.valid=должен быть от 1 до текущего года
validation.locale.supported=должен быть одним из следующих: en, de, ru
validation.ban.configuration=Либо поле "Заблокирован навсегда" должно быть отмечено, либо поле "Заблокирован до" должно быть указано
validation.nickname.pattern=может содержать только буквы, цифры и символ подчеркивания