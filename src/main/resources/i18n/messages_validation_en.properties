validation.password.strong=must be 8-64 characters long and contain upper and lower case letters, a digit, and a special character
validation.image.base64=must be a valid Base64 string and must not exceed {maxLength} characters
validation.publicationYear.valid=must be between 1 and the current year
validation.locale.supported=must be one of: en, de, ru
validation.ban.configuration=Either field "Banned permanently" must be true or field "Banned until" must be provided
validation.nickname.pattern=may contain only letters, digits, and underscore