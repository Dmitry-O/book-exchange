validation.password.strong=muss 8-64 Zeichen lang sein und Groß- und Kleinbuchstaben, eine Ziffer und ein Sonderzeichen enthalten
validation.image.base64=muss ein gültiger Base64-String sein und darf höchstens {maxLength} Zeichen lang sein
validation.publicationYear.valid=muss zwischen 1 und dem aktuellen Jahr liegen
validation.locale.supported=muss eine der folgenden sein: en, de, ru
validation.ban.configuration=Entweder muss das Feld "Dauerhaft gesperrt" auf true gesetzt sein oder das Feld "Gesperrt bis" angegeben werden
validation.ban.until.future=muss in der Zukunft liegen
validation.nickname.pattern=darf nur Buchstaben, Ziffern und Unterstriche enthalten
validation.email.format=muss eine gültige E-Mail-Adresse sein
validation.email.length=darf höchstens 254 Zeichen lang sein
validation.demoDataPolicy.accepted=muss in der Demo-Umgebung akzeptiert werden
