spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL}
spring.jpa.database=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.docker.compose.enabled=true

spring.datasource.hikari.pool-name=${DB_POOL_NAME:BookExchangeDB-Pool}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.data-source-properties.cachePrepStmts=${DB_CACHE_PREP_STMTS:true}
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=${DB_PREP_STMT_CACHE_SIZE:250}
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=${DB_PREP_STMT_CACHE_SQL_LIMIT:2048}
spring.datasource.hikari.data-source-properties.useServerPrepStmts=${DB_USE_SERVER_PREP_STMTS:true}
spring.datasource.hikari.data-source-properties.useLocalSessionState=${DB_USE_LOCAL_SESSION_STATE:true}
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=${DB_REWRITE_BATCHED_STATEMENTS:true}
spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=${DB_CACHE_RESULT_SET_METADATA:true}
spring.datasource.hikari.data-source-properties.cacheServerConfiguration=${DB_CACHE_SERVER_CONFIGURATION:true}
spring.datasource.hikari.data-source-properties.elideSetAutoCommits=${DB_ELIDGE_SET_AUTO_COMMITS:true}
spring.datasource.hikari.data-source-properties.maintainTimeStats=${DB_MAINTAIN_TIME_STATS:false}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:30000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME:15000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.jwt-secret-key=${APP_JWT_SECRET_KEY}
app.email-sent-from=${APP_EMAIL_SENT_FROM}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.messages.basename=i18n/messages_user,i18n/messages_admin,i18n/messages_field,i18n/messages_system
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true
spring.messages.use-code-as-default-message=true

