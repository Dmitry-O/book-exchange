spring.application.name=book-exchange
spring.h2.console.enabled=true
logging.level.com.example=debug
spring.flyway.enabled=false
spring.docker.compose.enabled=false
spring.jpa.open-in-view=false

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.jwt-secret-key=${APP_JWT_SECRET_KEY}
app.email-sent-from=${APP_EMAIL_SENT_FROM}
app.base-api-path=${APP_BASE_API_PATH:/api/v1}
app.access-token-time-to-live=54000
app.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.storage.s3.region=${APP_STORAGE_S3_REGION:eu-north-1}
app.storage.s3.test-bucket=${APP_STORAGE_S3_TEST_BUCKET:book-exchange-test}
app.storage.s3.prod-bucket=${APP_STORAGE_S3_PROD_BUCKET:book-exchange-prod}
app.storage.s3.use-test-bucket=${APP_STORAGE_S3_USE_TEST_BUCKET:false}
app.storage.image.max-width=${APP_STORAGE_IMAGE_MAX_WIDTH:1200}
app.storage.image.max-height=${APP_STORAGE_IMAGE_MAX_HEIGHT:1200}
app.storage.image.jpeg-quality=${APP_STORAGE_IMAGE_JPEG_QUALITY:0.82}
app.storage.cleanup.soft-deleted-book-photo-retention-days=${APP_STORAGE_CLEANUP_SOFT_DELETED_BOOK_PHOTO_RETENTION_DAYS:30}
app.storage.cleanup.soft-deleted-book-photo-cron=${APP_STORAGE_CLEANUP_SOFT_DELETED_BOOK_PHOTO_CRON:0 30 3 * * *}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.messages.basename=i18n/messages_user,i18n/messages_admin,i18n/messages_field,i18n/messages_system,i18n/messages_validation
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true
spring.messages.use-code-as-default-message=true
spring.http.converters.preferred-json-mapper=jackson2
spring.jackson2.serialization.write-dates-as-timestamps=false

springdoc.packages-to-scan=com.example.bookexchange.auth.api,com.example.bookexchange.user.api,com.example.bookexchange.book.api,com.example.bookexchange.report.api,com.example.bookexchange.exchange.api,com.example.bookexchange.admin.api,com.example.bookexchange.common.api
springdoc.paths-to-match=/**
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=none
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.use-root-path=true
#springdoc.api-docs.enabled=false  --- Disabled for PROD
#springdoc.swagger-ui.enabled=false  --- Disabled for PROD

spring.mvc.servlet.path=${APP_BASE_API_PATH:/api/v1}

management.server.port=${MANAGEMENT_PORT:9090}
management.endpoints.web.exposure.include=health,info,prometheus
management.info.env.enabled=true
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true
management.endpoints.web.base-path=/actuator
info.app.name=book-exchange
info.app.version=1.0

