spring.application.name=book-exchange
spring.h2.console.enabled=true
logging.level.com.example=debug
spring.flyway.enabled=false
spring.docker.compose.enabled=false
spring.jpa.open-in-view=false

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.jwt-secret-key=${APP_JWT_SECRET_KEY}
app.email-sent-from=${APP_EMAIL_SENT_FROM}
app.base-api-path=${APP_BASE_API_PATH:/api/v1}
app.runtime-env=${RUNTIME_ENV:local}
app.access-token-time-to-live=${APP_ACCESS_TOKEN_TTL:54000}
app.scheduler.zone=${APP_SCHEDULER_ZONE:UTC}
app.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.notification.email-batch-delay-millis=${APP_NOTIFICATION_EMAIL_BATCH_DELAY_MILLIS:0}
app.openapi.server-url=${APP_OPENAPI_SERVER_URL:${APP_BASE_API_PATH:/api/v1}}
app.report.snapshot-retention-days=${APP_REPORT_SNAPSHOT_RETENTION_DAYS:180}
app.report.snapshot-cleanup-cron=${APP_REPORT_SNAPSHOT_CLEANUP_CRON:0 45 3 * * *}
app.token-cleanup.cron=${APP_TOKEN_CLEANUP_CRON:0 58 15 * * *}
app.showcase.backend-github-url=${APP_SHOWCASE_BACKEND_GITHUB_URL:https://github.com/Dmitry-O/book-exchange}
app.showcase.frontend-github-url=${APP_SHOWCASE_FRONTEND_GITHUB_URL:https://github.com/Dmitry-O/book-exchange-frontend}
app.showcase.linkedin-url=${APP_SHOWCASE_LINKEDIN_URL:}
app.showcase.swagger-url=${APP_SHOWCASE_SWAGGER_URL:}
app.demo-access.token-hash=${APP_DEMO_ACCESS_TOKEN_HASH:}
app.demo-access.cookie-name=${APP_DEMO_ACCESS_COOKIE_NAME:BE_DEMO_ACCESS}
app.demo-access.cookie-ttl-seconds=${APP_DEMO_ACCESS_COOKIE_TTL_SECONDS:604800}
app.demo-access.secure-cookie=${APP_DEMO_ACCESS_SECURE_COOKIE:true}
app.demo-origin-guard.enabled=${APP_DEMO_ORIGIN_GUARD_ENABLED:false}
app.demo-origin-guard.header-name=${APP_DEMO_ORIGIN_GUARD_HEADER_NAME:X-Origin-Verify}
app.demo-origin-guard.header-value=${APP_DEMO_ORIGIN_GUARD_HEADER_VALUE:}
app.demo-accounts.email-pattern=${APP_DEMO_ACCOUNTS_EMAIL_PATTERN:%.demo@example.com}
app.demo-accounts.password=${APP_DEMO_ACCOUNTS_PASSWORD:}
app.demo-email-sandbox.enabled=${APP_DEMO_EMAIL_SANDBOX_ENABLED:false}
app.demo-email-sandbox.mailpit-api-base-url=${APP_DEMO_EMAIL_SANDBOX_MAILPIT_API_BASE_URL:http://localhost:8025}
app.demo-email-sandbox.mailpit-username=${APP_DEMO_EMAIL_SANDBOX_MAILPIT_USERNAME:}
app.demo-email-sandbox.mailpit-password=${APP_DEMO_EMAIL_SANDBOX_MAILPIT_PASSWORD:}
app.demo-email-sandbox.session-ttl-minutes=${APP_DEMO_EMAIL_SANDBOX_SESSION_TTL_MINUTES:180}
app.demo-email-sandbox.max-messages=${APP_DEMO_EMAIL_SANDBOX_MAX_MESSAGES:500}
app.demo-email-sandbox.delete-expired-messages=${APP_DEMO_EMAIL_SANDBOX_DELETE_EXPIRED_MESSAGES:true}
app.demo-email-sandbox.cleanup-interval-millis=${APP_DEMO_EMAIL_SANDBOX_CLEANUP_INTERVAL_MILLIS:300000}
app.demo-reset.enabled=${APP_DEMO_RESET_ENABLED:false}
app.demo-reset.cron=${APP_DEMO_RESET_CRON:0 0 0 * * *}
app.demo-reset.zone=${APP_DEMO_RESET_ZONE:UTC}
app.demo-reset.seed-s3-key=${APP_DEMO_RESET_SEED_S3_KEY:}
app.demo-reset.s3-runtime-prefix=${APP_DEMO_RESET_S3_RUNTIME_PREFIX:runtime/}
app.demo-reset.clear-mailpit=${APP_DEMO_RESET_CLEAR_MAILPIT:true}
app.demo-reset.reindex-search=${APP_DEMO_RESET_REINDEX_SEARCH:true}
app.storage.s3.region=${APP_STORAGE_S3_REGION:eu-north-1}
app.storage.s3.test-bucket=${APP_STORAGE_S3_TEST_BUCKET:book-exchange-test}
app.storage.s3.prod-bucket=${APP_STORAGE_S3_PROD_BUCKET:book-exchange-prod}
app.storage.s3.use-test-bucket=${APP_STORAGE_S3_USE_TEST_BUCKET:false}
app.storage.s3.key-prefix=${APP_STORAGE_S3_KEY_PREFIX:}
app.storage.image.max-width=${APP_STORAGE_IMAGE_MAX_WIDTH:1200}
app.storage.image.max-height=${APP_STORAGE_IMAGE_MAX_HEIGHT:1200}
app.storage.image.jpeg-quality=${APP_STORAGE_IMAGE_JPEG_QUALITY:0.82}
app.storage.cleanup.soft-deleted-book-photo-retention-days=${APP_STORAGE_CLEANUP_SOFT_DELETED_BOOK_PHOTO_RETENTION_DAYS:30}
app.storage.cleanup.soft-deleted-book-photo-cron=${APP_STORAGE_CLEANUP_SOFT_DELETED_BOOK_PHOTO_CRON:0 30 3 * * *}
app.search.books.enabled=${APP_BOOK_SEARCH_ENABLED:false}
app.search.books.reindex-on-startup=${APP_BOOK_SEARCH_REINDEX_ON_STARTUP:false}
app.search.books.min-search-length=${APP_BOOK_SEARCH_MIN_SEARCH_LENGTH:3}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

spring.messages.basename=i18n/messages_user,i18n/messages_admin,i18n/messages_field,i18n/messages_system,i18n/messages_validation,i18n/messages_email
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true
spring.messages.use-code-as-default-message=true
spring.http.converters.preferred-json-mapper=jackson2
spring.jackson2.serialization.write-dates-as-timestamps=false
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
#spring.elasticsearch.username=${SPRING_ELASTICSEARCH_USERNAME:}
#spring.elasticsearch.password=${SPRING_ELASTICSEARCH_PASSWORD:}

springdoc.packages-to-scan=com.example.bookexchange.auth.api,com.example.bookexchange.user.api,com.example.bookexchange.book.api,com.example.bookexchange.report.api,com.example.bookexchange.exchange.api,com.example.bookexchange.admin.api,com.example.bookexchange.common.api,com.example.bookexchange.common.demoaccess,com.example.bookexchange.common.demoaccounts,com.example.bookexchange.common.demoemail
springdoc.paths-to-match=/**
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=none
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
springdoc.swagger-ui.use-root-path=true

spring.mvc.servlet.path=${APP_BASE_API_PATH:/api/v1}

management.server.port=${MANAGEMENT_PORT:9090}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}
management.info.env.enabled=true
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_ENABLED:false}
management.endpoints.web.base-path=/actuator
info.app.name=book-exchange
info.app.version=1.0

