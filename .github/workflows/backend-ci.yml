name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and Package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run full test suite
        run: ./mvnw -B verify

      - name: Print test summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import xml.etree.ElementTree as ET

          def collect(pattern):
              totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0}
              for path in glob.glob(pattern):
                  root = ET.parse(path).getroot()
                  for key in totals:
                      totals[key] += int(root.attrib.get(key, 0))
              return totals

          surefire = collect("target/surefire-reports/TEST-*.xml")
          failsafe = collect("target/failsafe-reports/TEST-*.xml")
          total = {key: surefire[key] + failsafe[key] for key in surefire}

          print("Test summary:")
          print(f"Unit tests       : {surefire['tests']}")
          print(f"Integration tests: {failsafe['tests']}")
          print(f"Total tests      : {total['tests']}")
          print(f"Failures         : {total['failures']}")
          print(f"Errors           : {total['errors']}")
          print(f"Skipped          : {total['skipped']}")
          PY

      - name: Upload application jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          if-no-files-found: error

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --pull -t book-exchange-backend:ci .
